:root {

  --nox-red: #f87171;

  --font-display: 'Sora', sans-serif;

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
body {

  color: var(--text-primary);
  min-height: 100vh;

}
body::before {
  content: '';
  position: fixed;

  width: 100%; height: 100%;
  background:

  pointer-events: none;

}
.nox-container { position: relative; z-index: 1; max-width: 1440px; margin: 0 auto; padding: 20px 16px; }

/* HEADER */
.nox-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 20px 0; margin-bottom: 24px;
  border-bottom: 1px solid var(--border-subtle);
}
.nox-logo {
  font-family: var(--font-display);
  font-size: 1.6rem; font-weight: 800;
  letter-spacing: -0.03em;
  background: linear-gradient(135deg, var(--nox-cyan), var(--nox-orange));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.nox-logo .proj { font-weight: 400; -webkit-text-fill-color: var(--text-secondary); font-size: 0.75em; margin-left: 2px; letter-spacing: 0.02em; }
.nox-logo .mode { display: block; font-size: 0.45em; font-weight: 500; letter-spacing: 0.15em; text-transform: uppercase; -webkit-text-fill-color: var(--text-muted); margin-top: 2px; }
.nox-meta { text-align: right; font-size: 0.8rem; color: var(--text-muted); font-family: var(--font-mono); }
.nox-meta b { color: var(--nox-cyan); }

/* STAT STRIP */
.nox-stats {
  display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px;
}
.nox-stat {
  display: flex; align-items: center; gap: 6px;
  background: var(--bg-card); border: 1px solid var(--border-subtle);
  border-radius: 20px; padding: 6px 14px;
  font-size: 0.78rem; font-weight: 500;
  cursor: pointer; transition: all 0.2s;
  user-select: none;
}
.nox-stat:hover { border-color: var(--border-dim); background: var(--bg-elevated); }
.nox-stat.active { border-color: var(--nox-cyan); background: var(--nox-cyan-dim); color: var(--nox-cyan); }
.nox-stat .cnt { font-family: var(--font-mono); font-weight: 700; font-size: 0.85rem; }
.nox-stat .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

.nox-filters {

  margin-bottom: 16px;
  padding: 10px 14px;
  background: var(--bg-card); border: 1px solid var(--border-subtle);
  border-radius: var(--radius);

.nox-filters label { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-right: 2px; }
.nox-filters select, .nox-filters input {

  padding: 5px 10px; font-size: 0.78rem; font-family: var(--font-mono);

}
.nox-filters select:focus, .nox-filters input:focus { border-color: var(--nox-cyan); }
.nox-filters input[type=number] { width: 60px; }
.nox-filters input[type=text] { width: 100px; }
.nox-btn { background: var(--bg-elevated); color: var(--text-secondary); border: 1px solid var(--border-subtle);

.nox-btn:hover { color: var(--text-primary); border-color: var(--border-dim); }

tr { transition: background 0.1s; }
tr:hover { background: var(--bg-hover); }
tr.hl { background: rgba(34,211,238,0.04); }
tr.hidden { display: none; }

/* BADGES */
.sig-badge {

const DL={"BUY": "AL", "SELL": "SAT"};
const TL={"RSI_CLASSIC": "RSI Klasik", "RSI_HIDDEN": "RSI Gizli", "MACD_CLASSIC": "MACD Klasik", "MACD_HIDDEN": "MACD Gizli", "OBV_CLASSIC": "OBV Klasik", "OBV_HIDDEN": "OBV Gizli", "MFI_CLASSIC": "MFI Klasik", "MFI_HIDDEN": "MFI Gizli", "ADX_EXHAUST": "ADX Bitisi", "TRIPLE": "Uclu", "PRICE_VOLUME": "Fiyat-Hacim"};
const TABS=["triple", "rsi", "macd", "obv", "mfi", "adx", "pv"];
const TAB_LABELS={"triple": "UCLU", "rsi": "RSI", "macd": "MACD", "obv": "OBV", "mfi": "MFI", "adx": "ADX", "pv": "FH"};
const TAB_COLORS={"triple": "var(--nox-purple)", "rsi": "var(--nox-cyan)", "macd": "var(--nox-orange)", "obv": "var(--nox-green)", "mfi": "var(--nox-blue)", "adx": "var(--nox-yellow)", "pv": "var(--nox-red)"};
let curTab='all',col='quality',asc=false;

function initTabs(){
  const bar=document.getElementById('tabs');
  // "Tumu" tab
  const allBtn=document.createElement('div');
  allBtn.className='tab-btn active';allBtn.dataset.t='all';
  allBtn.innerHTML='<span class="dot" style="background:var(--nox-cyan)"></span>Tumu <span class="cnt">'+D.length+'</span>';
  allBtn.onclick=()=>setTab('all');
  bar.appendChild(allBtn);
  TABS.forEach(t=>{
    const cnt=D.filter(r=>r.category===t).length;
    if(!cnt)return;
    const btn=document.createElement('div');
    btn.className='tab-btn';btn.dataset.t=t;
    btn.innerHTML='<span class="dot" style="background:'+TAB_COLORS[t]+'"></span>'+TAB_LABELS[t]+' <span class="cnt">'+cnt+'</span>';
    btn.onclick=()=>setTab(t);
    bar.appendChild(btn);
  });
}

function setTab(t){
  curTab=t;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector('.tab-btn[data-t="'+t+'"]').classList.add('active');
  af();
}

function af(){
  const dir=document.getElementById('fDir').value;
  const minQ=parseInt(document.getElementById('fQ').value)||0;
  const sr=document.getElementById('fS').value.toUpperCase();
  let f=D.filter(r=>{
    if(curTab!=='all'&&r.category!==curTab)return false;
    if(dir&&r.direction!==dir)return false;
    if(r.quality<minQ)return false;
    if(sr&&!r.ticker.includes(sr))return false;
    return true;
  });
  f.sort((a,b)=>{
    let va=a[col],vb=b[col];
    if(typeof va==='string')return asc?va.localeCompare(vb):vb.localeCompare(va);
    return asc?(va||0)-(vb||0):(vb||0)-(va||0);
  });
  render(f);
}

function sb(c){if(col===c)asc=!asc;else{col=c;asc=c==='ticker'||c==='signal_date'};
  document.querySelectorAll('th').forEach(h=>h.classList.remove('sorted'));
  af();
}

function reset(){
  curTab='all';
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector('.tab-btn[data-t="all"]').classList.add('active');
  document.getElementById('fDir').value='';
  document.getElementById('fQ').value='0';
  document.getElementById('fS').value='';
  af();
}

function mkDetail(r){
  const parts=[];
  if(r.rsi_prev!=null)parts.push('RSI: '+r.rsi_prev+'→'+r.rsi_curr);
  if(r.hist_prev!=null)parts.push('Hist: '+r.hist_prev+'→'+r.hist_curr);
  if(r.obv_prev!=null)parts.push('OBV: '+Math.round(r.obv_prev)+'→'+Math.round(r.obv_curr));
  if(r.mfi_prev!=null)parts.push('MFI: '+r.mfi_prev+'→'+r.mfi_curr);
  if(r.adx_value!=null)parts.push('ADX: '+r.adx_value+' s='+r.adx_slope);
  if(r.sub_type)parts.push(r.sub_type);
  if(r.vol_ratio!=null)parts.push('VolR: x'+r.vol_ratio);
  if(r.range_atr!=null)parts.push('R/ATR: '+r.range_atr);
  if(r.limit_tag)parts.push('['+r.limit_tag+']');
  if(r.has_mfi)parts.push('MFI+');
  return parts.length?'<span class="detail-cell">'+parts.join(', ')+'</span>':'<span style="color:var(--text-muted)">—</span>';
}

function render(data){
  const tb=document.getElementById('tb');tb.innerHTML='';
  data.forEach(r=>{
    const tr=document.createElement('tr');
    const dirCls=r.direction==='BUY'?'dir-buy':'dir-sell';
    const qCls=r.quality>=60?'q-hi':r.quality>=40?'q-mid':'q-lo';
    const tipLabel=TL[r.div_type]||r.div_type;
    const dateStr=r.signal_date?r.signal_date.slice(5):'—';
    tr.innerHTML=`<td><a class="tv-link" href="https://www.tradingview.com/chart/?symbol=BIST:${r.ticker}" target="_blank">${r.ticker}</a></td>
<td class="${dirCls}">${DL[r.direction]||r.direction}</td>
<td style="font-size:.72rem">${tipLabel}</td>
<td>${r.close}</td>
<td class="${qCls}" style="font-weight:700">${r.quality}</td>
<td>${mkDetail(r)}</td>
<td style="color:var(--text-muted);font-size:.72rem">${dateStr}</td>`;
    tb.appendChild(tr);
  });
  document.getElementById('st').innerHTML='<b>'+data.length+'</b> / '+D.length;
}

initTabs();
af();
</script></body></html>
